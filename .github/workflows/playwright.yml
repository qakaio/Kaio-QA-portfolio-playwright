name: Playwright CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
        default: 'all'

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  CI_BROWSERS: ${{ github.event.inputs.browser || 'chromium' }}

jobs:
  test:
    name: Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
        include:
          - browser: chromium
            project: chromium

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright CI smoke tests
        run: |
          npx playwright test ci-smoke.spec.js --project=${{ matrix.project }} --retries=2 --trace=on-first-retry
        env:
          CI: true
          CI_BROWSERS: chromium
          CI_SKIP_CLOUDFLARE: 'true'
          CRITICAL_SMOKE: 'false'

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

  allure:
    name: Generate Allure Report
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Run tests for Allure
        run: npx playwright test ci-smoke.spec.js --project=chromium --retries=1
        env:
          CI: true
          CI_BROWSERS: chromium
          CI_SKIP_CLOUDFLARE: 'true'
          CRITICAL_SMOKE: 'false'

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report
        env:
          ALLURE_RESULTS_DIR: allure-results

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report
          keep_files: true

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download HTML Reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: playwright-report-merged/
          merge-multiple: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report-merged
          destination_dir: .
          keep_files: true

  notify:
    name: Notify on Failure
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Playwright tests failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run: ${{ github.run_id }}"
          echo "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"